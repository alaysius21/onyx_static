<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Dashboard | Onyx Paws</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://cdn.datatables.net/2.1.8/css/dataTables.bootstrap5.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div class="admin-app d-flex min-vh-100">
  <div class="admin-overlay d-lg-none" id="adminOverlay"></div>
  <aside class="admin-sidebar-exact" id="adminSidebar">
    <div class="p-4 border-bottom border-light-subtle d-flex align-items-center justify-content-between">
      <a href="home.html" class="text-decoration-none d-flex align-items-center gap-3">
        <img src="assets/images/logo_nobackground.png" alt="Onyx Paws Logo" style="width:80px;height:80px;border:5px solid #37b7b7;border-radius:20px"/>
        <div><div class="admin-logo-title">Onyx Paws</div><div class="admin-logo-sub">Admin</div></div>
      </a>
      <button class="btn btn-link text-muted d-lg-none p-0" id="closeSidebar"><i class="bi bi-x-lg fs-5"></i></button>
    </div>
    <div class="p-4 border-bottom border-light-subtle">
      <div class="d-flex align-items-center gap-3"><div class="admin-avatar-exact">O</div><div class="min-w-0"><div class="fw-bold text-dark text-truncate">Onyx Admin</div><div class="small text-secondary text-truncate">admin@onyxpaws.local</div></div></div>
    </div>
    <nav class="p-3 admin-nav">
      <a class="admin-nav-link" data-tab-link="bookings" href="admin-dashboard.html?tab=bookings"><i class="bi bi-card-checklist"></i><span>Bookings</span><i class="bi bi-chevron-right ms-auto"></i></a>
      <a class="admin-nav-link" data-tab-link="clientforms" href="admin-dashboard.html?tab=clientforms"><i class="bi bi-file-earmark-text"></i><span>Client Forms</span><i class="bi bi-chevron-right ms-auto"></i></a>
      <a class="admin-nav-link" data-tab-link="services" href="admin-dashboard.html?tab=services"><i class="bi bi-gear"></i><span>Services</span><i class="bi bi-chevron-right ms-auto"></i></a>
      <a class="admin-nav-link" data-tab-link="gallery" href="admin-dashboard.html?tab=gallery"><i class="bi bi-image"></i><span>Gallery</span><i class="bi bi-chevron-right ms-auto"></i></a>
      <a class="admin-nav-link" data-tab-link="users" href="admin-dashboard.html?tab=users"><i class="bi bi-people"></i><span>Users</span><i class="bi bi-chevron-right ms-auto"></i></a>
    </nav>
    <div class="p-3 mt-auto border-top border-light-subtle">
      <a href="home.html" class="admin-footer-link">View Website</a>
      <a href="admin-login.html" id="logoutLink" class="admin-footer-link text-danger"><i class="bi bi-box-arrow-right me-2"></i>Logout</a>
    </div>
  </aside>
  <div class="flex-grow-1 admin-content-wrap">
    <div class="d-lg-none bg-white border-bottom px-3 py-3 d-flex align-items-center justify-content-between shadow-sm"><button class="btn btn-link text-dark p-0" id="openSidebar"><i class="bi bi-list fs-3"></i></button><div class="fw-bold">Onyx Paws Admin</div><div style="width:32px"></div></div>
    <main class="admin-main-exact p-3 p-lg-4 p-xl-5"><div id="adminMount"></div></main>
  </div>
</div>
<div class="modal fade client-doc-modal" id="clientDocModal" tabindex="-1"><div class="modal-dialog modal-lg modal-dialog-centered"><div class="modal-content client-doc-modal"><div class="modal-header border-0 text-white"><h5 class="modal-title fw-bold" id="clientDocModalTitle">Client Document</h5><button class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div><div class="modal-body p-0"><iframe id="clientDocFrame" src="about:blank" style="width:100%;min-height:78vh;border:0;display:block"></iframe></div></div></div></div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.datatables.net/2.1.8/js/dataTables.js"></script>
  <script src="https://cdn.datatables.net/2.1.8/js/dataTables.bootstrap5.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/app.js"></script>
